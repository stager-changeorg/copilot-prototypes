const CCCard = ({ title, Icon, iconColor, badge, children, fullWidth }) => {
  const [exp, setExp] = useState(false);
  return (
    <div className="card" style={{
      display: "flex", flexDirection: "column",
      gridColumn: fullWidth ? "1 / -1" : undefined,
    }}>
      <div style={{
        display: "flex", alignItems: "center", gap: 9,
        padding: "12px 16px", borderBottom: "1px solid rgba(255,255,255,0.05)",
        background: "rgba(255,255,255,0.01)",
      }}>
        <div style={{
          width: 27, height: 27, borderRadius: 7, flexShrink: 0,
          background: `${iconColor}13`, border: `1px solid ${iconColor}25`,
          display: "flex", alignItems: "center", justifyContent: "center", color: iconColor,
        }}><Icon /></div>
        <span style={{ fontSize: 13, fontWeight: 700, color: "#dce8f5", flex: 1 }}>{title}</span>
        {badge && <Pill color="amber">{badge}</Pill>}
        <button onClick={() => setExp(!exp)} style={{
          background: exp ? "rgba(37,99,235,0.13)" : "rgba(255,255,255,0.04)",
          border: `1px solid ${exp ? "rgba(37,99,235,0.28)" : "rgba(255,255,255,0.07)"}`,
          borderRadius: 6, padding: "4px 9px",
          fontSize: 10, fontWeight: 800, letterSpacing: "0.04em",
          color: exp ? "#7db4f8" : "#3a4f6a", cursor: "pointer", transition: "all 0.15s",
        }}>{exp ? "COLLAPSE ↑" : "EXPAND ↓"}</button>
      </div>
      <div style={{ padding: "14px 16px", flex: 1 }}>
        {children(exp)}
      </div>
    </div>
  );
};
