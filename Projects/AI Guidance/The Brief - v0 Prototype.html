<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Brief — Change.org AI Co-Pilot</title>

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ch-red':          '#e01a2b',
            'ch-red-hover':    '#d40225',
            'ch-red-deep':     '#af0521',
            'ch-red-light':    '#fef1f3',
            'ch-red-mid':      '#ffe2e1',
            'ch-blue':         '#0d4dfb',
            'ch-blue-deep':    '#003193',
            'ch-blue-mid':     '#4771ff',
            'ch-blue-light':   '#f0f7ff',
            'ch-blue-tint':    '#cddbff',
            'ch-text':         '#3a293e',
            'ch-muted':        '#6f7381',
            'ch-label':        '#8a8e9d',
            'ch-border':       '#dde0e9',
            'ch-border-strong':'#b7bbc9',
            'ch-bg':           '#f1f3f8',
            'ch-surface':      '#ffffff',
            'ch-subtle':       '#e9ebf3',
          }
        }
      }
    }
  </script>

  <!-- React 18 + ReactDOM (UMD) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>

  <!-- Babel Standalone (JSX transform) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    /* Hide scrollbar on tab bar */
    .tabs-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .tabs-scroll::-webkit-scrollbar { display: none; }

    /* Progress bar animation */
    .progress-fill { transition: width 0.6s ease; }

    /* Card expand animation */
    .card-body { animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

    /* Smooth hover transitions */
    button, a { transition: background-color 0.12s, border-color 0.12s, color 0.12s, opacity 0.12s; }
  </style>
</head>

<body class="bg-ch-bg text-ch-text">
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ═══════════════════════════════════════════════════════════
// DEMO DATA
// ═══════════════════════════════════════════════════════════

const CAMPAIGN = {
  title: "End Mandatory Minimum Sentencing for Nonviolent Drug Offenses",
  signatures: 4847,
  goal: 10000,
  day: 34,
  phase: 2,
  phaseName: "Build",
  phases: [
    { name: "Spark",    days: "Days 1–14",  status: "done" },
    { name: "Build",    days: "Days 15–50", status: "current" },
    { name: "Pressure", days: "Days 51–90", status: "upcoming" },
    { name: "Decision", days: "Days 91+",   status: "upcoming" },
  ],
};

const MILESTONES = [
  { id: 1, task: "Reach 2,500 signatures",             status: "done",     completedDay: 20, dueDay: 21, note: null },
  { id: 2, task: "Earn first press mention",            status: "done",     completedDay: 25, dueDay: 28, note: "The Marshall Project" },
  { id: 3, task: "Reach 10,000 signatures",             status: "progress", pct: 48,  dueDay: 50, label: "4,847 / 10,000" },
  { id: 4, task: "Contact 5 senators directly",         status: "progress", pct: 60,  dueDay: 45, label: "3 of 5" },
  { id: 5, task: "Secure 1 national org endorsement",   status: "pending",  dueDay: 50 },
];

const NETWORK = {
  swingPct: 41,
  states: [
    { abbr: "CA", count: 823 },
    { abbr: "NY", count: 612 },
    { abbr: "TX", count: 489 },
    { abbr: "IL", count: 334 },
    { abbr: "OH", count: 287 },
  ],
  quote: {
    text: "My son got 8 years for first-time possession. This petition gives me hope that someone is finally listening.",
    author: "Maria T., Ohio",
  },
  petitions: [
    { title: "Repeal the 1994 Crime Bill Sentencing Provisions",   sigs: 12400 },
    { title: "End Racial Disparities in Federal Drug Sentencing",  sigs: 8900  },
    { title: "Pass the SAFE Justice Act Now",                      sigs: 5200  },
  ],
  orgs: [
    { name: "ACLU",                             desc: "Criminal Justice Reform Division" },
    { name: "Brennan Center for Justice",        desc: "Sentencing Reform Program" },
    { name: "Families Against Mandatory Minimums", desc: "National advocacy coalition" },
  ],
};

const DM = {
  primary: {
    initials: "DD",
    name: "Sen. Dick Durbin",
    role: "Chair, Senate Judiciary Committee",
    party: "Democrat · IL",
    receptivity: "medium-high",
    points: [
      "3 of your signers are his Illinois constituents",
      "He co-sponsored the SAFE Justice Act in 2015 — this is his bill",
      "His office responded to 2 constituent letters this week",
      "Committee markup begins in 6 days — the window is open",
    ],
    whatItTakes:
      "Constituent contact from Illinois signers, coalition endorsements from civil rights orgs, earned media in the Chicago Tribune or Sun-Times.",
  },
  secondary: [
    { name: "Sen. Chuck Grassley", role: "Ranking Member, Judiciary · R-IA", receptivity: "low-medium", initials: "CG" },
    { name: "AG Merrick Garland",  role: "Attorney General · DC",             receptivity: "medium",     initials: "MG" },
    { name: "Sen. Cory Booker",    role: "Co-sponsor, likely ally · D-NJ",    receptivity: "high",       initials: "CB" },
  ],
};

const STORY = {
  narrative:
    "What started as one family's nightmare became a national call for justice. After your neighbor received a 10-year mandatory minimum for a nonviolent drug offense, you launched this campaign to end a policy that has torn apart communities for decades. In 34 days, nearly 5,000 people have joined you — from Texas to New York — each carrying their own story of a system that trades human lives for mandatory numbers. The SAFE Justice Act is stalled in committee, but momentum is building. You are not alone in this fight.",
  timeline: [
    { day: 1,  event: "Campaign launched",                   detail: '"I can\'t let what happened to my neighbor happen to anyone else."' },
    { day: 7,  event: "First 500 signatures",                detail: "Campaign hits local social media — momentum builds organically" },
    { day: 18, event: "Featured on Change.org homepage",     detail: "Signature pace doubles overnight — 1,200 new signers in 48 hours" },
    { day: 25, event: "First press mention",                 detail: "The Marshall Project covers the story — national credibility established" },
    { day: 34, event: "SAFE Justice Act enters markup",      detail: "The window is now open — this is the moment you've been building toward" },
  ],
};


// ═══════════════════════════════════════════════════════════
// MICRO-COMPONENTS
// ═══════════════════════════════════════════════════════════

const ChevronRight = ({ size = 16, className = "" }) => (
  <svg width={size} height={size} viewBox="0 0 16 16" fill="none" className={className}>
    <path d="M6 3.5L10 8l-4 4.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

const ChevronDown = ({ size = 16, className = "" }) => (
  <svg width={size} height={size} viewBox="0 0 16 16" fill="none" className={className}>
    <path d="M3.5 6L8 10l4.5-4" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

const CheckCircle = () => (
  <svg width={18} height={18} viewBox="0 0 18 18" fill="none" className="flex-shrink-0">
    <circle cx="9" cy="9" r="8.25" fill="#dcfce7" stroke="#16a34a" strokeWidth="1.5"/>
    <path d="M5.5 9l2.5 2.5L12.5 6" stroke="#16a34a" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

const ClockCircle = () => (
  <svg width={18} height={18} viewBox="0 0 18 18" fill="none" className="flex-shrink-0">
    <circle cx="9" cy="9" r="8.25" fill="#eff6ff" stroke="#0d4dfb" strokeWidth="1.5"/>
    <path d="M9 5.5V9l2.5 2" stroke="#0d4dfb" strokeWidth="1.6" strokeLinecap="round"/>
  </svg>
);

const EmptyCircle = () => (
  <svg width={18} height={18} viewBox="0 0 18 18" fill="none" className="flex-shrink-0">
    <circle cx="9" cy="9" r="8.25" stroke="#dde0e9" strokeWidth="1.5"/>
  </svg>
);

const StarIcon = () => (
  <svg width={12} height={12} viewBox="0 0 12 12" fill="none">
    <path d="M6 1l1.5 3.5L11 5l-2.5 2.5.5 3.5L6 9.5 3 11l.5-3.5L1 5l3.5-.5L6 1z" fill="white"/>
  </svg>
);

const RECEPTIVITY = {
  "high":        { label: "High",        bg: "bg-emerald-50", text: "text-emerald-700", dot: "bg-emerald-500" },
  "medium-high": { label: "Medium-High", bg: "bg-amber-50",   text: "text-amber-700",   dot: "bg-amber-400"  },
  "medium":      { label: "Medium",      bg: "bg-yellow-50",  text: "text-yellow-700",  dot: "bg-yellow-500" },
  "low-medium":  { label: "Low-Medium",  bg: "bg-orange-50",  text: "text-orange-700",  dot: "bg-orange-400" },
  "low":         { label: "Low",         bg: "bg-red-50",     text: "text-red-600",     dot: "bg-red-400"    },
};

const ReceptivityBadge = ({ level }) => {
  const c = RECEPTIVITY[level] || RECEPTIVITY["medium"];
  return (
    <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold ${c.bg} ${c.text}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${c.dot}`}></span>
      Receptivity: {c.label}
    </span>
  );
};

const AICallout = ({ children }) => (
  <div className="bg-ch-blue-light border border-ch-blue-tint rounded-xl p-4 flex gap-3">
    <div className="flex-shrink-0 mt-0.5 w-6 h-6 rounded-full bg-ch-blue flex items-center justify-center">
      <StarIcon />
    </div>
    <div className="text-sm text-ch-blue-deep leading-relaxed">{children}</div>
  </div>
);

const Card = ({ children, className = "" }) => (
  <div className={`bg-white rounded-2xl border border-ch-border shadow-sm ${className}`}>
    {children}
  </div>
);

const CardPad = ({ children, className = "" }) => (
  <Card className={className}>
    <div className="p-6">{children}</div>
  </Card>
);

const SectionLabel = ({ color = "bg-ch-red", children }) => (
  <div className="flex items-center gap-2 mb-4">
    <div className={`w-1.5 h-5 ${color} rounded-full`}></div>
    <span className="text-xs font-bold text-ch-label uppercase tracking-widest">{children}</span>
  </div>
);

const CTABtn = ({ children, full = false }) => (
  <button className={`bg-ch-red hover:bg-ch-red-hover text-white font-semibold px-5 py-2.5 rounded-xl text-sm ${full ? "w-full" : ""}`}>
    {children}
  </button>
);

const OutlineBtn = ({ children }) => (
  <button className="border border-ch-border hover:border-ch-border-strong hover:bg-ch-subtle text-ch-text font-medium px-4 py-2 rounded-lg text-sm">
    {children}
  </button>
);

const Divider = () => <div className="h-px bg-ch-border mx-4"></div>;


// ═══════════════════════════════════════════════════════════
// SECTION: THE BRIEF
// ═══════════════════════════════════════════════════════════

const SummaryRow = ({ icon, label, text, onClick }) => (
  <button
    onClick={onClick}
    className="w-full flex items-center gap-3 py-3 px-4 rounded-xl hover:bg-ch-subtle transition-colors text-left group"
  >
    <span className="text-lg w-7 text-center flex-shrink-0">{icon}</span>
    <div className="flex-1 min-w-0">
      <div className="text-[10px] font-bold text-ch-label uppercase tracking-widest mb-0.5">{label}</div>
      <div className="text-sm text-ch-text leading-snug">{text}</div>
    </div>
    <ChevronRight size={14} className="text-ch-label group-hover:text-ch-blue flex-shrink-0" />
  </button>
);

const TheBrief = ({ onNavigate }) => (
  <div className="space-y-4">
    <CardPad>
      <div className="flex items-center gap-2 mb-3">
        <div className="w-1.5 h-5 bg-ch-blue rounded-full"></div>
        <span className="text-[10px] font-bold text-ch-blue-deep uppercase tracking-widest">AI Daily Brief · Day {CAMPAIGN.day}</span>
      </div>
      <AICallout>
        The SAFE Justice Act enters Senate markup in <strong>6 days</strong>. Sen. Durbin's office is watching. You have a {CAMPAIGN.signatures.toLocaleString()}-strong coalition and 1,987 swing-state signers ready to act. This is your window — here's how to use it.
      </AICallout>
    </CardPad>

    <Card className="!p-3">
      <SummaryRow
        icon="📍" label="My Roadmap"
        text="Phase 2 of 4 — Build. On track for Pressure Phase by Day 50."
        onClick={() => onNavigate("roadmap")}
      />
      <Divider />
      <SummaryRow
        icon="⚡" label="Next Move"
        text="Draft constituent pressure letters for 3 Judiciary Committee swing votes."
        onClick={() => onNavigate("roadmap")}
      />
      <Divider />
      <SummaryRow
        icon="🤝" label="My Network"
        text={`${NETWORK.swingPct}% of your signers are in swing states. ACLU is running parallel messaging.`}
        onClick={() => onNavigate("network")}
      />
      <Divider />
      <SummaryRow
        icon="🎯" label="Decision Maker"
        text="Durbin receptivity: Medium-High. Optimal pressure window: next 6 days."
        onClick={() => onNavigate("decision")}
      />
    </Card>

    <Card>
      <div className="p-5">
        <div className="flex items-start justify-between gap-4">
          <div className="flex-1">
            <div className="text-[10px] font-bold text-ch-blue-deep uppercase tracking-widest mb-1.5">Your Next Move</div>
            <h3 className="text-base font-bold text-ch-text mb-2 leading-snug">Draft & Send a Constituent Pressure Letter</h3>
            <p className="text-sm text-ch-muted leading-relaxed mb-4">
              Sen. Durbin's committee marks up the SAFE Justice Act in 6 days. Constituent letters from swing-state signers are your highest-leverage move right now. You have <strong className="text-ch-text font-semibold">1,987 eligible signers</strong> ready to act.
            </p>
            <CTABtn>Draft Letter Now →</CTABtn>
          </div>
          <div className="w-14 h-14 rounded-2xl bg-ch-blue-light flex items-center justify-center text-2xl flex-shrink-0">✉️</div>
        </div>
      </div>
    </Card>
  </div>
);


// ═══════════════════════════════════════════════════════════
// SECTION: MY ROADMAP
// ═══════════════════════════════════════════════════════════

const MyRoadmap = () => {
  const phaseStyle = {
    done:     { wrap: "bg-ch-subtle border-ch-border",        label: "text-ch-muted",     name: "text-ch-muted",  day: "text-ch-label"  },
    current:  { wrap: "bg-ch-red-light border-ch-red",        label: "text-ch-red",       name: "text-ch-red font-bold", day: "text-ch-red" },
    upcoming: { wrap: "bg-white border-ch-border",            label: "text-ch-label",     name: "text-ch-label",  day: "text-ch-label"  },
  };

  return (
    <div className="space-y-4">
      <CardPad>
        <SectionLabel>Campaign Arc</SectionLabel>
        <div className="flex items-stretch gap-2 mb-5">
          {CAMPAIGN.phases.map((phase, i) => {
            const s = phaseStyle[phase.status];
            return (
              <React.Fragment key={phase.name}>
                <div className={`flex-1 border-2 rounded-xl p-3 text-center relative ${s.wrap}`}>
                  <div className={`text-[9px] font-bold uppercase tracking-widest mb-0.5 ${s.label}`}>Phase {i + 1}</div>
                  <div className={`text-sm ${s.name}`}>{phase.name}</div>
                  <div className={`text-[10px] mt-0.5 ${s.day}`}>{phase.days}</div>
                  {phase.status === "current" && (
                    <div className="absolute -bottom-3 left-1/2 -translate-x-1/2 bg-ch-red text-white text-[9px] font-bold px-2 py-0.5 rounded-full whitespace-nowrap">
                      Day {CAMPAIGN.day} ←
                    </div>
                  )}
                </div>
                {i < CAMPAIGN.phases.length - 1 && (
                  <div className={`flex-shrink-0 self-center h-0.5 w-3 ${phase.status === "done" ? "bg-ch-border-strong" : "bg-ch-border"}`} />
                )}
              </React.Fragment>
            );
          })}
        </div>

        <div className="bg-ch-blue-light border border-ch-blue-tint rounded-xl px-4 py-3 flex items-center gap-3 mt-6">
          <span className="text-lg">📈</span>
          <p className="text-sm text-ch-blue-deep">
            You're tracking <strong>34% faster</strong> than similar federal sentencing reform campaigns at Day 34.
          </p>
        </div>
      </CardPad>

      <CardPad>
        <SectionLabel>30-Day Milestones</SectionLabel>
        <div className="space-y-4">
          {MILESTONES.map(m => (
            <div key={m.id} className="flex items-start gap-3">
              {m.status === "done" ? <CheckCircle /> : m.status === "progress" ? <ClockCircle /> : <EmptyCircle />}
              <div className="flex-1 min-w-0">
                <div className="flex items-start justify-between gap-2">
                  <span className={`text-sm font-medium ${m.status === "done" ? "line-through text-ch-muted" : "text-ch-text"}`}>
                    {m.task}
                  </span>
                  <span className="text-xs text-ch-label flex-shrink-0">by Day {m.dueDay}</span>
                </div>
                {m.status === "done" && (
                  <div className="text-xs text-emerald-600 mt-0.5">
                    ✓ Completed Day {m.completedDay}{m.note ? ` · ${m.note}` : ""}
                  </div>
                )}
                {m.status === "progress" && (
                  <div className="mt-1.5">
                    <div className="flex justify-between mb-1">
                      <span className="text-xs text-ch-blue-deep font-medium">{m.label}</span>
                    </div>
                    <div className="h-1.5 bg-ch-subtle rounded-full overflow-hidden">
                      <div className="progress-fill h-full bg-ch-blue rounded-full" style={{ width: `${m.pct}%` }}></div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      </CardPad>
    </div>
  );
};


// ═══════════════════════════════════════════════════════════
// SECTION: MY NETWORK
// ═══════════════════════════════════════════════════════════

const MyNetwork = () => {
  const maxCount = Math.max(...NETWORK.states.map(s => s.count));

  return (
    <div className="space-y-4">
      <CardPad>
        <SectionLabel>Your Supporters</SectionLabel>
        <div className="flex items-end justify-between gap-2 mb-5" style={{ height: "80px" }}>
          {NETWORK.states.map(s => (
            <div key={s.abbr} className="flex-1 flex flex-col items-center justify-end gap-1">
              <div
                className="w-full bg-ch-blue rounded-t-md"
                style={{ height: `${Math.max(10, (s.count / maxCount) * 64)}px`, opacity: 0.5 + (s.count / maxCount) * 0.5 }}
              />
              <div className="text-xs font-bold text-ch-text">{s.abbr}</div>
              <div className="text-[10px] text-ch-muted">{s.count.toLocaleString()}</div>
            </div>
          ))}
        </div>
        <div className="border-l-4 border-ch-red pl-4 pr-2 py-3 bg-ch-subtle rounded-r-xl">
          <p className="text-sm text-ch-text italic leading-relaxed mb-1.5">"{NETWORK.quote.text}"</p>
          <div className="text-xs font-semibold text-ch-muted">— {NETWORK.quote.author}</div>
        </div>
      </CardPad>

      <CardPad>
        <SectionLabel color="bg-ch-blue">You're Not Alone</SectionLabel>
        <p className="text-xs text-ch-muted -mt-2 mb-4 ml-3">Related petitions fighting the same battle</p>
        <div className="space-y-2">
          {NETWORK.petitions.map((p, i) => (
            <div key={i} className="flex items-center gap-3 p-3 rounded-xl border border-ch-border hover:bg-ch-subtle hover:border-ch-border-strong cursor-pointer group">
              <div className="flex-1">
                <div className="text-sm font-medium text-ch-text group-hover:text-ch-blue">{p.title}</div>
                <div className="text-xs text-ch-muted mt-0.5">{p.sigs.toLocaleString()} signatures</div>
              </div>
              <ChevronRight size={14} className="text-ch-label flex-shrink-0" />
            </div>
          ))}
        </div>
      </CardPad>

      <CardPad>
        <SectionLabel color="bg-ch-blue">National Organizations</SectionLabel>
        <div className="space-y-3">
          {NETWORK.orgs.map((org, i) => (
            <div key={i} className="flex items-center gap-4 p-3 rounded-xl border border-ch-border">
              <div className="w-10 h-10 rounded-xl bg-ch-subtle border border-ch-border flex items-center justify-center text-xs font-bold text-ch-muted flex-shrink-0">
                {org.name.charAt(0)}
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-semibold text-ch-text">{org.name}</div>
                <div className="text-xs text-ch-muted">{org.desc}</div>
              </div>
              <OutlineBtn>Reach them →</OutlineBtn>
            </div>
          ))}
        </div>
      </CardPad>
    </div>
  );
};


// ═══════════════════════════════════════════════════════════
// SECTION: DECISION MAKER INTEL
// ═══════════════════════════════════════════════════════════

const DecisionMakerIntel = () => (
  <div className="space-y-4">
    <CardPad>
      <SectionLabel>Primary Target</SectionLabel>

      <div className="flex items-start gap-4 mb-5">
        <div className="w-14 h-14 rounded-2xl bg-ch-subtle border-2 border-ch-border flex items-center justify-center text-base font-bold text-ch-muted flex-shrink-0">
          {DM.primary.initials}
        </div>
        <div>
          <h3 className="text-base font-bold text-ch-text leading-tight">{DM.primary.name}</h3>
          <div className="text-sm text-ch-muted mb-2">{DM.primary.role}</div>
          <div className="flex flex-wrap gap-2">
            <ReceptivityBadge level={DM.primary.receptivity} />
            <span className="text-xs px-2.5 py-1 bg-ch-subtle rounded-full text-ch-muted font-medium">{DM.primary.party}</span>
          </div>
        </div>
      </div>

      <div className="mb-4">
        <div className="text-[10px] font-bold text-ch-label uppercase tracking-widest mb-2.5">Key Pressure Points</div>
        <div className="space-y-2">
          {DM.primary.points.map((pt, i) => (
            <div key={i} className="flex items-start gap-2.5 text-sm text-ch-text">
              <span className="text-ch-red font-bold mt-0.5 flex-shrink-0">·</span>
              <span>{pt}</span>
            </div>
          ))}
        </div>
      </div>

      <div className="bg-ch-blue-light border border-ch-blue-tint rounded-xl p-4 mb-4">
        <div className="text-[10px] font-bold text-ch-blue-deep uppercase tracking-widest mb-1.5">What Gets His Attention</div>
        <p className="text-sm text-ch-blue-deep leading-relaxed">{DM.primary.whatItTakes}</p>
      </div>

      <CTABtn full>Write to Durbin's Office →</CTABtn>
    </CardPad>

    <CardPad>

};


// ═══════════════════════════════════════════════════════════
// AGENTATION FEEDBACK TOOLBAR
// ═══════════════════════════════════════════════════════════

const AgentationToolbar = () => {
  const [open, setOpen] = useState(false);
  const [text, setText] = useState("");
  const [state, setState] = useState("idle"); // idle | sending | done

  const submit = async () => {
    if (!text.trim()) return;
    setState("sending");
    try {
      await fetch("http://localhost:4747/feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ feedback: text, url: window.location.href, timestamp: new Date().toISOString() }),
      });
    } catch (_) {}
    setState("done");
    setTimeout(() => { setOpen(false); setState("idle"); setText(""); }, 2200);
  };

  return (
    <div style={{
      position: "fixed", bottom: "24px", left: "50%", transform: "translateX(-50%)", zIndex: 100001,
      display: "flex", flexDirection: "column", alignItems: "center", gap: "8px",
      fontFamily: "system-ui, -apple-system, sans-serif",
    }}>
      {open && (
        <div style={{
          width: "300px", background: "#1a1a1a", borderRadius: "16px", padding: "16px",
          boxShadow: "0 4px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.07)",
          animation: "fadeIn 0.18s ease",
        }}>
          {state === "done" ? (
            <div style={{ textAlign: "center", color: "#4ade80", padding: "6px 0", fontSize: "14px", fontWeight: "600" }}>
              ✓ Feedback sent
            </div>
          ) : (
            <>
              <div style={{ color: "#fff", fontSize: "13px", fontWeight: "600", marginBottom: "10px" }}>
                Leave feedback on this prototype
              </div>
              <textarea
                value={text}
                onChange={e => setText(e.target.value)}
                placeholder="What's working? What's off?"
                style={{
                  width: "100%", minHeight: "76px", background: "#2a2a2a", border: "1px solid #3a3a3a",
                  borderRadius: "8px", color: "#f0f0f0", fontSize: "13px", padding: "8px 10px",
                  resize: "none", outline: "none", fontFamily: "system-ui, sans-serif", marginBottom: "10px",
                }}
              />
              <div style={{ display: "flex", gap: "8px", justifyContent: "flex-end" }}>
                <button
                  onClick={() => setOpen(false)}
                  style={{ background: "transparent", border: "1px solid #3a3a3a", color: "#888", borderRadius: "8px", padding: "6px 12px", fontSize: "12px", cursor: "pointer" }}
                >
                  Cancel
                </button>
                <button
                  onClick={submit}
                  disabled={state === "sending" || !text.trim()}
                  style={{
                    background: text.trim() ? "#e01a2b" : "#3a2a2a", color: "#fff", border: "none",
                    borderRadius: "8px", padding: "6px 14px", fontSize: "12px", fontWeight: "600", cursor: text.trim() ? "pointer" : "default",
                  }}
                >
                  {state === "sending" ? "Sending…" : "Send"}
                </button>
              </div>
            </>
          )}
        </div>
      )}

      <button
        onClick={() => setOpen(o => !o)}
        style={{
          background: "#1a1a1a", color: "#fff", border: "1px solid rgba(255,255,255,0.1)",
          borderRadius: "20px", padding: "8px 16px", fontSize: "12px", fontWeight: "600", cursor: "pointer",
          display: "flex", alignItems: "center", gap: "6px",
          boxShadow: "0 2px 12px rgba(0,0,0,0.25)",
        }}
      >
        <span style={{ fontSize: "14px" }}>💬</span> Leave feedback
      </button>
    </div>
  );
};
